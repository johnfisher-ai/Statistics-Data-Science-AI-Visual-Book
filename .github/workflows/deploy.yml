name: Build & Deploy Book to GitHub Pages

# Runs on every push to main. Renders all chapter notebooks to HTML
# (preserving their saved outputs) and publishes the whole site to Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nbconvert
        run: pip install --quiet nbconvert

      - name: Render notebooks to HTML
        run: |
          mkdir -p chapters/notebooks/html
          for nb in chapters/notebooks/*.ipynb; do
            [ -e "$nb" ] || continue
            name=$(basename "${nb%.ipynb}")
            echo "Rendering $name"
            jupyter nbconvert --to html --output-dir chapters/notebooks/html --output "$name.html" "$nb"
          done
          # Inject the styled "Back to the book" card into each rendered HTML page
          python scripts/inject_notebook_backlinks.py

      - uses: actions/configure-pages@v5
        with:
          enablement: true          # auto-enable Pages (build type = GitHub Actions) on first run
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
